<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanizador Pro - Diccionario Extendido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }

        function procesar() {
            const input = document.getElementById('input-text').value;
            const output = document.getElementById('output-text');
            const copyBtn = document.getElementById('copy-btn');

            if (!input.trim()) {
                output.innerHTML = "<span class='text-red-500'>Escribe algo primero...</span>";
                return;
            }

            // DICCIONARIO DE SUSTANTIVOS Y TÉRMINOS COMPLEJOS -> SIMPLES
            const dic = {
                // Sustantivos Abstractos y Complejos
                "inefable": "imposible de explicar",
                "melancolía": "tristeza",
                "vacuidad": "vacío",
                "otrora": "antes",
                "paradigma": "modelo",
                "metodología": "forma de hacer las cosas",
                "herramientas": "utilidades",
                "incertidumbre": "duda",
                "vicisitudes": "problemas",
                "elocuencia": "buena comunicación",
                "estratagema": "truco",
                "procrastinación": "dejar las cosas para después",
                "resiliencia": "capacidad de aguantar",
                "discrepancia": "desacuerdo",
                "amalgama": "mezcla",
                "excedente": "lo que sobra",
                "preeminencia": "importancia",
                "connotación": "sentido",
                "repercusión": "efecto",
                "magnitud": "tamaño",
                "celeridad": "rapidez",
                "exhaustividad": "detalle",
                "idiosincrasia": "forma de ser",

                // Sustantivos de Objetos/Conceptos IA
                "dispositivo": "aparato",
                "funcionalidad": "función",
                "implementación": "puesta en marcha",
                "optimización": "mejora",
                "notificación": "aviso",
                "interfaz": "pantalla",
                "colaboración": "ayuda",

                // Adjetivos y Verbos (para mantener la coherencia)
                "adicionalmente": "además",
                "implementar": "hacer",
                "proporcionar": "dar",
                "utilizar": "usar",
                "fundamental": "clave",
                "no obstante": "pero",
                "asimismo": "también",
                "posee": "tiene",
                "determinar": "ver",
                "finalizar": "terminar",
                "mediante": "con"
            };

            let texto = input;
            let cambios = 0;

            // Ordenamos por longitud para evitar errores de reemplazo
            const palabrasOrdenadas = Object.keys(dic).sort((a, b) => b.length - a.length);

            for (let word of palabrasOrdenadas) {
                let regex = new RegExp("\\b" + word + "\\b", "gi");
                if (regex.test(texto)) {
                    texto = texto.replace(regex, `<span class="bg-yellow-200 dark:bg-yellow-600 dark:text-white px-1 rounded shadow-sm font-medium">${dic[word]}</span>`);
                    cambios++;
                }
            }

            output.innerHTML = texto;
            if (cambios === 0) {
                output.innerHTML += "<br><br><p class='text-xs text-indigo-500 italic'>* No se detectaron palabras complejas.</p>";
            }
            
            copyBtn.classList.remove('hidden');
        }

        function toggleDark() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white min-h-screen p-6 transition-colors duration-300">

    <div class="max-w-2xl mx-auto space-y-6 mt-10">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-indigo-600 dark:text-indigo-400">Humanizador</h1>
                <p class="text-sm text-slate-500">Simplifica sustantivos y términos complejos</p>
            </div>
            <button onclick="toggleDark()" class="p-2 bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 rounded-xl text-lg hover:scale-110 transition-transform">
                🌓
            </button>
        </div>

        <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700">
            <textarea id="input-text" class="w-full h-48 p-4 bg-slate-50 dark:bg-slate-900 border-none rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-lg" placeholder="Prueba con: 'La metodología posee una gran incertidumbre debido a las vicisitudes'"></textarea>
            
            <button onclick="procesar()" class="w-full mt-4 py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-lg active:scale-95 transition-all">
                SIMPLIFICAR VOCABULARIO
            </button>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-inner border border-slate-100 dark:border-slate-700">
            <div class="flex justify-between items-center mb-4 text-xs font-bold uppercase tracking-widest text-slate-400">
                <span>Resultado sugerido</span>
                <button id="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('output-text').innerText)" class="hidden text-indigo-500 hover:underline">Copiar Texto</button>
            </div>
            <div id="output-text" class="text-lg leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>

</body>
</html>
