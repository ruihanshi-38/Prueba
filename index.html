<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanizador - Simplifica tu vocabulario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Resaltado para las palabras transformadas */
        .highlight {
            background-color: #fef08a;
            border-bottom: 2px solid #facc15;
            padding: 0 2px;
            border-radius: 4px;
            cursor: help;
        }
        /* Suavizar la transición del placeholder */
        #output-text {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-extrabold text-indigo-700 tracking-tight">Humanizador</h1>
            <p class="text-slate-500 mt-3 text-lg">Transforma términos robóticos en lenguaje claro y humano.</p>
        </header>

        <main class="space-y-6">
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <label for="input-text" class="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wider">Texto de la IA:</label>
                <textarea id="input-text" 
                    class="w-full h-48 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all resize-none" 
                    placeholder="Pega aquí el texto que quieras simplificar..."></textarea>
            </section>

            <div class="flex justify-center">
                <button id="process-btn" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-2xl shadow-lg shadow-indigo-200 transition duration-300 transform hover:-translate-y-1 active:scale-95">
                    Simplificar Vocabulario
                </button>
            </div>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-sm font-bold text-slate-700 uppercase tracking-wider">Sugerencia más humana:</label>
                    <button id="copy-btn" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 hidden bg-indigo-50 px-3 py-1 rounded-full">Copiar texto</button>
                </div>
                <div id="output-text" class="w-full min-h-[12rem] p-4 bg-indigo-50/30 border border-indigo-100 rounded-xl text-slate-800 leading-relaxed whitespace-pre-wrap">
                    <span class="text-slate-400 italic">El resultado aparecerá aquí...</span>
                </div>
            </section>
        </main>

        <footer class="mt-12 text-center text-slate-400 text-sm">
            <p>Proyecto para GitHub | Mantén tu comunicación auténtica</p>
        </footer>
    </div>

            "utilizar": "usar",
            "fundamental": "clave",
            "en la actualidad": "hoy",
            "notable": "gran",
            "posee": "tiene",
            "con el fin de": "para",
            "determinar": "ver",
            "no obstante": "pero",
            "asimismo": "también",
            "por consiguiente": "entonces",
            "en base a": "según",
            "paradigma": "modelo"
        };

        // Función para procesar el texto
        processBtn.addEventListener('click', () => {
            const text = inputText.value;

                return;
            }
