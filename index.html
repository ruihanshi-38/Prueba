<script>
    // Usamos un evento para asegurar que el DOM esté cargado
    document.addEventListener('DOMContentLoaded', () => {
        const inputField = document.getElementById('input-text');
        const outputDiv = document.getElementById('output-text');
        const processBtn = document.getElementById('process-btn');
        const copyBtn = document.getElementById('copy-btn');

        // Diccionario de términos
        const dictionary = {
            "adicionalmente": "además",
            "implementar": "hacer",
            "proporcionar": "dar",
            "exhaustivo": "completo",
            "consecuentemente": "así que",
            "optimizar": "mejorar",
            "utilizar": "usar",
            "fundamental": "clave",
            "en la actualidad": "hoy",
            "notable": "gran",
            "posee": "tiene",
            "con el fin de": "para",
            "determinar": "ver",
            "no obstante": "pero",
            "asimismo": "también",
            "por consiguiente": "entonces",
            "en base a": "según",
            "paradigma": "modelo"
        };

        // Escuchar el clic del botón
        processBtn.onclick = function() {
            const text = inputField.value;
            
            if (!text.trim()) {
                outputDiv.innerHTML = '<span class="text-red-400 italic">Escribe algo primero...</span>';
                return;
            }

            let result = text;

            // Procesar el reemplazo
            Object.keys(dictionary).forEach(word => {
                const regex = new RegExp(`\\b${word}\\b`, 'gi');
                result = result.replace(regex, (match) => {
                    return `<span class="highlight" style="background-color: #fef08a; border-bottom: 2px solid #facc15; border-radius: 4px; padding: 0 2px;">${dictionary[word.toLowerCase()]}</span>`;
                });
            });

            // Inyectar el resultado
            outputDiv.innerHTML = result;
            copyBtn.classList.remove('hidden');
        };

        // Limpiar si se borra el input
        inputField.oninput = function() {
            if (this.value === "") {
                outputDiv.innerHTML = '<span class="text-slate-400 italic">El resultado aparecerá aquí...</span>';
                copyBtn.classList.add('hidden');
            }
        };
    });
</script>
